{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="row mt-4">
    <div class="col-lg-6 mx-auto">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white"><h5 class="mb-0"><i class="bi bi-gear"></i> {{ title }}</h5></div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-bold text-primary">Количество кредитов *</label>
                        {{ form.credits }}
                    </div>
                    <label class="fw-bold border-bottom pb-2 mb-3 d-block">Распределение (Пар в неделю):</label>
                    <div class="row g-3 mb-4">
                        <div class="col-6"><label class="small text-muted">Лекции</label>{{ form.lecture_pairs }}</div>
                        <div class="col-6"><label class="small text-muted">Практика</label>{{ form.practice_pairs }}</div>
                        <div class="col-6"><label class="small text-muted">Лабораторные</label>{{ form.lab_pairs }}</div>
                        <div class="col-6"><label class="small text-muted">СРСП</label>{{ form.srsp_pairs }}</div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success w-100 fw-bold">Сохранить шаблон</button>
                        <a href="{% url 'schedule:manage_credit_templates' %}" class="btn btn-secondary w-100">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
